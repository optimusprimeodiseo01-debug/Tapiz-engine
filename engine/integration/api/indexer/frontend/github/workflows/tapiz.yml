name: tapiz-engine

on:
  issues:
    types: [opened]

jobs:
  tapiz:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Ejecutar motor tapiz sobre issue
        run: |
          echo '${{ github.event.issue.body }}' > input.txt
          python process_issue.py

      - name: Comentar resultado en issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('output.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
