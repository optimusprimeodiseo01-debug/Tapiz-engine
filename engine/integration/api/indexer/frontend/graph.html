<!DOCTYPE html>
<html>
<head>
  <title>Tapiz Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<svg width="800" height="600"></svg>

<script>
fetch("http://localhost:5000/grafo")
.then(r => r.json())
.then(data => {

  const nodes = data.map(d => ({ id: d.idea }));

  const svg = d3.select("svg");

  const simulation = d3.forceSimulation(nodes)
    .force("charge", d3.forceManyBody())
    .force("center", d3.forceCenter(400, 300));

  const node = svg.selectAll("circle")
    .data(nodes)
    .enter()
    .append("circle")
    .attr("r", 5);

  simulation.on("tick", () => {
    node
      .attr("cx", d => d.x)
      .attr("cy", d => d.y);
  });

});
</script>

</body>
</html>
